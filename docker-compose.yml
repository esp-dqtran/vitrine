x-object-store-env: &object-store-env
  OBJECT_STORE_BACKEND: s3
  OBJECT_STORE_S3_BUCKET: ${OBJECT_STORE_S3_BUCKET:-vitrine-ai-prod}
  OBJECT_STORE_S3_REGION: ${OBJECT_STORE_S3_REGION:-ap-southeast-1}
  OBJECT_STORE_S3_PREFIX: ${OBJECT_STORE_S3_PREFIX:-prod}
  # No OBJECT_STORE_S3_ENDPOINT/FORCE_PATH_STYLE — those are MinIO-only concerns (a custom,
  # Docker-internal endpoint). Real S3 resolves its own regional endpoint and is reachable
  # the same way from inside the container as from a browser, so neither is needed. No
  # OBJECT_STORE_ACCESS_KEY_ID/SECRET either — AWS_PROFILE below plus the mounted ~/.aws
  # directory let the SDK's default credential chain resolve real credentials.
  AWS_PROFILE: ${AWS_PROFILE:-vitrine-ai-prod}

services:
  # Decommissioned as the live DB (migrated to Supabase — see DATABASE_URL below/.env). Kept
  # behind the `legacy-db` profile as a rollback path so it never starts on a plain
  # `docker compose up`; start it with `docker compose --profile legacy-db up postgres`.
  postgres:
    profiles: ["legacy-db"]
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: astryx
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"   # AMQP
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672" # management UI (guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-3010}:3000" # host 3000 is taken by an unrelated local project
    environment:
      <<: *object-store-env
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
      RABBITMQ_URL: amqp://rabbitmq
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost.test}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-astryx-local-admin-password}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_local_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_local_placeholder}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-price_local_monthly}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID:-price_local_yearly}
      APP_URL: ${APP_URL:-http://localhost:5173}
      REFERRAL_CAMPAIGN_ID: ${REFERRAL_CAMPAIGN_ID:-launch-2026}
      REFERRAL_CAMPAIGN_START: ${REFERRAL_CAMPAIGN_START:-2026-07-21T00:00:00Z}
      REFERRAL_CAMPAIGN_END: ${REFERRAL_CAMPAIGN_END:-2026-10-19T00:00:00Z}
      MEDIA_SIGNING_SECRET: ${MEDIA_SIGNING_SECRET:-local-media-signing-secret-32-bytes}
      # Required by billingConfigFromEnv at boot (base64 of 32 bytes). Override in prod.
      CRAWL_SESSION_ENCRYPTION_KEY: ${CRAWL_SESSION_ENCRYPTION_KEY:-i4cY3peMFMHgctXIOGOELMMaZI+PjSsh8e/rU9bgmBU=}
      GENERAL_RATE_LIMIT: ${GENERAL_RATE_LIMIT:-300}
      MEDIA_RATE_LIMIT: ${MEDIA_RATE_LIMIT:-500}
      APP_TRAVERSAL_LIMIT: ${APP_TRAVERSAL_LIMIT:-20}
      ADVANCED_SEARCH_ENABLED: ${ADVANCED_SEARCH_ENABLED:-false}
      SEARCH_EMBEDDING_BASE_URL: ${SEARCH_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      SEARCH_EMBEDDING_API_KEY: ${SEARCH_EMBEDDING_API_KEY:-}
      SEARCH_EMBEDDING_MODEL: ${SEARCH_EMBEDDING_MODEL:-text-embedding-3-small}
      TEST_ACCOUNT: ${TEST_ACCOUNT:-}
      ATLASSIAN_TEST_EMAIL: ${ATLASSIAN_TEST_EMAIL:-}
    volumes:
      - ./data/images:/app/data/images:ro
      - ~/.aws:/root/.aws:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: on-failure

  # Not part of the default api/rabbitmq/worker stack. Gated behind the `discover` profile;
  # run with `docker compose --profile discover up discover`.
  discover:
    profiles: ["discover"]
    build:
      context: .
      dockerfile: services/discover/Dockerfile
    ports:
      - "3001:3001"
    environment:
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  import-worker:
    build:
      context: .
      dockerfile: services/import-worker/Dockerfile
    environment:
      <<: *object-store-env
      RABBITMQ_URL: amqp://rabbitmq
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
      HEADLESS: "true"
      CRAWL_PROFILE_ROOT: /app/data/browser-profiles-linux
      CHAT_PROFILE_ROOT: /app/data/chat-profiles-linux
      CRAWL_STALE_RUN_THRESHOLD_MS: ${CRAWL_STALE_RUN_THRESHOLD_MS:-300000}
      RESEARCH_LLM_BASE_URL: ${RESEARCH_LLM_BASE_URL:-https://api.openai.com/v1}
      RESEARCH_LLM_API_KEY: ${RESEARCH_LLM_API_KEY:-}
      RESEARCH_LLM_MODEL: ${RESEARCH_LLM_MODEL:-}
      TEST_ACCOUNT: ${TEST_ACCOUNT:-}
      ATLASSIAN_TEST_EMAIL: ${ATLASSIAN_TEST_EMAIL:-}
      # Chrome's cookie store is encrypted with an OS-level key (macOS Keychain / Linux
      # libsecret) — the host's data/browser-profile-mobbin can't be decrypted here. This
      # container gets its own Linux-native profile volume, seeded via the portable storageState
      # export instead (run `npm run export-storage-state` locally after logging in, once,
      # and whenever the session expires).
      MOBBIN_PROFILE_DIR: /app/browser-profile
      MOBBIN_STORAGE_STATE_PATH: /app/secrets/mobbin-storage-state.json
    volumes:
      - import-worker-profile:/app/browser-profile
      - import-worker-downloads:/app/data/downloads
      - ./data/mobbin-storage-state.json:/app/secrets/mobbin-storage-state.json:ro
      - ~/.aws:/root/.aws:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  search-index-worker:
    build:
      context: .
      dockerfile: services/search-index-worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
      ADVANCED_SEARCH_ENABLED: ${ADVANCED_SEARCH_ENABLED:-false}
      SEARCH_EMBEDDING_BASE_URL: ${SEARCH_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      SEARCH_EMBEDDING_API_KEY: ${SEARCH_EMBEDDING_API_KEY:-}
      SEARCH_EMBEDDING_MODEL: ${SEARCH_EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  sites-import-worker:
    build:
      context: .
      dockerfile: services/sites-import-worker/Dockerfile
    environment:
      <<: *object-store-env
      RABBITMQ_URL: amqp://rabbitmq
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
      HEADLESS: "true"
      MOBBIN_SITES_PROFILE_DIR: /app/browser-profile
      MOBBIN_SITES_STORAGE_STATE_PATH: /app/secrets/mobbin-storage-state.json
    volumes:
      - sites-import-worker-profile:/app/browser-profile
      - ./data/mobbin-storage-state.json:/app/secrets/mobbin-storage-state.json:ro
      - ~/.aws:/root/.aws:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  public-page-import-worker:
    build:
      context: .
      dockerfile: services/public-page-import-worker/Dockerfile
    environment:
      <<: *object-store-env
      RABBITMQ_URL: amqp://rabbitmq
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
      HEADLESS: "true"
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  storage-migrate:
    profiles: ["storage-tools"]
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    command: ["node", "--experimental-strip-types", "scripts/migrate-media-to-objects.ts"]
    environment:
      <<: *object-store-env
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
      MEDIA_MIGRATION_APPLY: ${MEDIA_MIGRATION_APPLY:-0}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  storage-verify:
    profiles: ["storage-tools"]
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    command: ["node", "--experimental-strip-types", "scripts/verify-object-storage.ts"]
    environment:
      <<: *object-store-env
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/astryx}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  rabbitmq-data:
  postgres-data:
  minio-data:
  import-worker-profile:
  sites-import-worker-profile:
  import-worker-downloads:
