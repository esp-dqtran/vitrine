services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: astryx
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3010:3000" # host 3000 is taken by an unrelated local project
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
      RABBITMQ_URL: amqp://rabbitmq
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID:-}
      APP_URL: ${APP_URL:-http://localhost:5173}
      MEDIA_SIGNING_SECRET: ${MEDIA_SIGNING_SECRET:-}
      GENERAL_RATE_LIMIT: ${GENERAL_RATE_LIMIT:-300}
      MEDIA_RATE_LIMIT: ${MEDIA_RATE_LIMIT:-500}
      APP_TRAVERSAL_LIMIT: ${APP_TRAVERSAL_LIMIT:-20}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  discover:
    build:
      context: .
      dockerfile: services/discover/Dockerfile
    ports:
      - "3001:3001"
    environment:
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  import-worker:
    build:
      context: .
      dockerfile: services/import-worker/Dockerfile
    environment:
      RABBITMQ_URL: amqp://rabbitmq
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
      # Chrome's cookie store is encrypted with an OS-level key (macOS Keychain / Linux
      # libsecret) — the host's data/browser-profile-mobbin can't be decrypted here. This
      # container gets its own Linux-native profile dir, seeded via the portable storageState
      # export instead (run `npm run export-storage-state` locally after logging in, once,
      # and whenever the session expires).
      MOBBIN_PROFILE_DIR: /app/data/browser-profile-mobbin-linux
      MOBBIN_STORAGE_STATE_PATH: /app/data/mobbin-storage-state.json
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  rabbitmq-data:
  postgres-data:
