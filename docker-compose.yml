x-object-store-env: &object-store-env
  OBJECT_STORE_BACKEND: s3
  OBJECT_STORE_S3_BUCKET: ${OBJECT_STORE_S3_BUCKET:-astryx-media}
  OBJECT_STORE_S3_REGION: ${OBJECT_STORE_S3_REGION:-us-east-1}
  OBJECT_STORE_S3_PREFIX: ${OBJECT_STORE_S3_PREFIX:-local}
  OBJECT_STORE_S3_ENDPOINT: http://minio:9000
  OBJECT_STORE_S3_FORCE_PATH_STYLE: "true"
  OBJECT_STORE_ACCESS_KEY_ID: ${MINIO_APP_ACCESS_KEY:-astryx-app}
  OBJECT_STORE_SECRET_ACCESS_KEY: ${MINIO_APP_SECRET_KEY:-astryx-app-password-change-me}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: astryx
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"   # AMQP
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672" # management UI (guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-astryx-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-astryx-root-password-change-me}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-astryx-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-astryx-root-password-change-me}
      OBJECT_STORE_S3_BUCKET: ${OBJECT_STORE_S3_BUCKET:-astryx-media}
      OBJECT_STORE_ACCESS_KEY_ID: ${MINIO_APP_ACCESS_KEY:-astryx-app}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${MINIO_APP_SECRET_KEY:-astryx-app-password-change-me}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$OBJECT_STORE_S3_BUCKET"
        mc version enable "local/$$OBJECT_STORE_S3_BUCKET"
        cat >/tmp/astryx-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:ListBucket"],
              "Resource": ["arn:aws:s3:::$$OBJECT_STORE_S3_BUCKET"]
            },
            {
              "Effect": "Allow",
              "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
              "Resource": ["arn:aws:s3:::$$OBJECT_STORE_S3_BUCKET/*"]
            }
          ]
        }
        EOF
        mc admin policy create local astryx-app /tmp/astryx-policy.json || mc admin policy info local astryx-app >/dev/null
        mc admin user info local "$$OBJECT_STORE_ACCESS_KEY_ID" >/dev/null 2>&1 \
          || mc admin user add local "$$OBJECT_STORE_ACCESS_KEY_ID" "$$OBJECT_STORE_SECRET_ACCESS_KEY"
        mc admin policy attach local astryx-app --user "$$OBJECT_STORE_ACCESS_KEY_ID"
        mc ready local
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-3010}:3000" # host 3000 is taken by an unrelated local project
    environment:
      <<: *object-store-env
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
      RABBITMQ_URL: amqp://rabbitmq
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost.test}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-astryx-local-admin-password}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_local_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_local_placeholder}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-price_local_monthly}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID:-price_local_yearly}
      APP_URL: ${APP_URL:-http://localhost:5173}
      MEDIA_SIGNING_SECRET: ${MEDIA_SIGNING_SECRET:-local-media-signing-secret-32-bytes}
      GENERAL_RATE_LIMIT: ${GENERAL_RATE_LIMIT:-300}
      MEDIA_RATE_LIMIT: ${MEDIA_RATE_LIMIT:-500}
      APP_TRAVERSAL_LIMIT: ${APP_TRAVERSAL_LIMIT:-20}
      TEST_ACCOUNT: ${TEST_ACCOUNT:-}
      ATLASSIAN_TEST_EMAIL: ${ATLASSIAN_TEST_EMAIL:-}
    volumes:
      - ./data/images:/app/data/images:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: on-failure

  discover:
    build:
      context: .
      dockerfile: services/discover/Dockerfile
    ports:
      - "3001:3001"
    environment:
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  import-worker:
    build:
      context: .
      dockerfile: services/import-worker/Dockerfile
    environment:
      <<: *object-store-env
      RABBITMQ_URL: amqp://rabbitmq
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
      HEADLESS: "true"
      CRAWL_PROFILE_ROOT: /app/data/browser-profiles-linux
      CHAT_PROFILE_ROOT: /app/data/chat-profiles-linux
      CRAWL_STALE_RUN_THRESHOLD_MS: ${CRAWL_STALE_RUN_THRESHOLD_MS:-300000}
      TEST_ACCOUNT: ${TEST_ACCOUNT:-}
      ATLASSIAN_TEST_EMAIL: ${ATLASSIAN_TEST_EMAIL:-}
      # Chrome's cookie store is encrypted with an OS-level key (macOS Keychain / Linux
      # libsecret) — the host's data/browser-profile-mobbin can't be decrypted here. This
      # container gets its own Linux-native profile volume, seeded via the portable storageState
      # export instead (run `npm run export-storage-state` locally after logging in, once,
      # and whenever the session expires).
      MOBBIN_PROFILE_DIR: /app/browser-profile
      MOBBIN_STORAGE_STATE_PATH: /app/secrets/mobbin-storage-state.json
    volumes:
      - import-worker-profile:/app/browser-profile
      - import-worker-downloads:/app/data/downloads
      - ./data/mobbin-storage-state.json:/app/secrets/mobbin-storage-state.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  storage-migrate:
    profiles: ["storage-tools"]
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    command: ["node", "--experimental-strip-types", "scripts/migrate-media-to-objects.ts"]
    environment:
      <<: *object-store-env
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
      MEDIA_MIGRATION_APPLY: ${MEDIA_MIGRATION_APPLY:-0}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: "no"

  storage-verify:
    profiles: ["storage-tools"]
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    command: ["node", "--experimental-strip-types", "scripts/verify-object-storage.ts"]
    environment:
      <<: *object-store-env
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astryx
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  rabbitmq-data:
  postgres-data:
  minio-data:
  import-worker-profile:
  import-worker-downloads:
